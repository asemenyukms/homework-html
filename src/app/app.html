<div class="page">
    <div class="content">
        <header class="navigation">
            <img class="logo" src="images/logo.png">
            <button id="add-counterparty-button" class="add-data-button block text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800" type="button">
                <img class="add-data-icon" src="images/add-data-icon.png">
                <span>Добавить</span>
            </button>
        </header>
        <main class="transactions-table relative overflow-x-auto">
            <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
                <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                <tr>
                    <th scope="col" class="px-6 py-3">
                        Наименование
                    </th>
                    <th scope="col" class="px-6 py-3">
                        ИНН
                    </th>
                    <th scope="col" class="px-6 py-3">
                        Адрес
                    </th>
                    <th scope="col" class="px-6 py-3">
                        КПП
                    </th>
                    <th scope="col" class="px-6 py-3">
                        Удалить
                    </th>
                </tr>
                </thead>
                <tbody id="counterparties-table-body"></tbody>
            </table>
        </main>
        <footer class="copyright-footer text-gray-500 text-sm">
            © 2007-2026 ООО "Логнекс"
        </footer>
    </div>
</div>

<template id="counterparty-row-template">
    <tr class="counterparty-row bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200 cursor-pointer">
        <th scope="row" class="px-6 py-4 font-normal text-gray-900 whitespace-nowrap dark:text-white js-counterparty-name"></th>
        <td class="px-6 py-4 js-counterparty-inn"></td>
        <td class="px-6 py-4 js-counterparty-address"></td>
        <td class="px-6 py-4 js-counterparty-kpp"></td>
        <td class="px-6 py-4">
            <button type="button" class="delete-counterparty-button text-red-700 hover:text-white border border-red-700 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-xs px-3 py-2 text-center dark:border-red-500 dark:text-red-500 dark:hover:text-white dark:hover:bg-red-600 dark:focus:ring-red-900 js-delete-counterparty-button">
                Удалить
            </button>
        </td>
    </tr>
</template>

<div id="crud-modal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full bg-gray-900/50">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                    Контрагент
                </h3>
                <button id="create-modal-close-button" type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <form id="create-counterparty-form" class="p-4 md:p-5 modal-inputs-container">
                <div>
                    <label for="create-name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Наименование</label>
                    <input type="text" name="name" id="create-name" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="ООО Ромашка" required>
                </div>
                <div>
                    <label for="create-inn" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">ИНН</label>
                    <input type="text" name="inn" id="create-inn" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="1234567890" required>
                </div>
                <div>
                    <label for="create-address" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Адрес</label>
                    <input type="text" name="address" id="create-address" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="г. Москва, ул. Пушкина, д. 10" required>
                </div>
                <div>
                    <label for="create-kpp" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">КПП</label>
                    <input type="text" name="kpp" id="create-kpp" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="123456789" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="modal-submit-button text-white inline-flex items-center bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
                        Сохранить
                    </button>
                    <button id="create-counterparty-cancel-button" type="button" class="modal-cancel-button text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-gray-700 dark:text-white dark:border-gray-500 dark:hover:bg-gray-600 dark:focus:ring-gray-600">
                        Отменить
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
